[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_SUPABASE_URL = ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY = ""
  NEXT_PUBLIC_STRIPE_PUBLIC_KEY = ""
  NEXT_PUBLIC_CALENDLY_URL = ""
  NEXT_PUBLIC_API_BASE_URL = ""

[dev]
  command = "npm run dev"
  port = 3000